server {
    server_name gardenproject.3nd.dev;
    root /var/www/gardenproject.3nd.dev/public;
    index index.html;

    location / {
        proxy_pass http://127.0.0.1:3841;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/gardenproject.3nd.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/gardenproject.3nd.dev/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = gardenproject.3nd.dev) {
        return 301 https://$host$request_uri;
    }

    server_name gardenproject.3nd.dev;
    listen 80;
    listen [::]:80;
    return 404;
}