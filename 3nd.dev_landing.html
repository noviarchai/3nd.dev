<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3ND — Built by the team behind threenudedudes.com</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #f0f0f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        .logo {
            font-size: 6rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            background: linear-gradient(135deg, #ff6b35, #f7c59f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }
        .tagline {
            font-size: 1.25rem;
            color: #888;
            margin-bottom: 3rem;
            max-width: 400px;
            line-height: 1.6;
        }
        .tagline a {
            color: #ff6b35;
            text-decoration: none;
        }
        .tagline a:hover {
            text-decoration: underline;
        }
        .divider {
            width: 40px;
            height: 2px;
            background: #333;
            margin: 0 auto 3rem;
        }
        .footer {
            font-size: 0.75rem;
            color: #444;
            margin-top: 2rem;
        }
        .footer a {
            color: #666;
            text-decoration: none;
        }
        .footer a:hover {
            color: #888;
        }
    </style>
</head>
<body>
    <div class="logo">3ND</div>
    <p class="tagline">
        The team behind <a href="https://threenudedudes.com" target="_blank" rel="noopener">threenudedudes.com</a><br>
        building tools, SaaS, and digital experiences.
    </p>
    <div class="divider"></div>
    <div class="footer">
        &copy; 2026 3ND — All rights reserved
    </div>
</body>
</html>
