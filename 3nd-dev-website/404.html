<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not That Way | 3ND.DEV</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #0a0a0a;
      --purple: #9D4EDD;
      --purple-glow: rgba(157, 78, 221, 0.5);
      --white: #FFFFFF;
      --gray: #A0A0A0;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Rajdhani', sans-serif;
      color: var(--white);
      text-align: center;
      padding: 20px;
      position: relative;
    }
    
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 50%, rgba(157, 78, 221, 0.1) 0%, transparent 60%);
      pointer-events: none;
    }
    
    .bg-img {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    
    .bg-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }
    
    .bg-img::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(10, 10, 10, 0.75) 0%, rgba(10, 10, 10, 0.92) 100%);
    }
    
    .content {
      position: relative;
      z-index: 1;
      max-width: 600px;
    }
    
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 28px;
      letter-spacing: 3px;
      color: var(--white);
      text-shadow: 0 0 20px var(--purple-glow);
      margin-bottom: 40px;
    }
    
    .img-wrap {
      margin-bottom: 40px;
    }
    
    .img-wrap img {
      max-width: 400px;
      width: 80vw;
      border-radius: 16px;
      box-shadow: 0 0 60px var(--purple-glow);
    }
    
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 8vw, 64px);
      letter-spacing: 4px;
      margin-bottom: 16px;
      text-shadow: 0 0 30px var(--purple-glow);
    }
    
    p {
      font-size: 20px;
      color: var(--gray);
      margin-bottom: 40px;
      font-weight: 500;
      letter-spacing: 1px;
    }
    
    .btn {
      display: inline-block;
      padding: 16px 48px;
      background: var(--purple);
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 3px;
      text-transform: uppercase;
      border-radius: 50px;
      box-shadow: 0 0 30px var(--purple-glow);
      transition: all 0.3s ease;
    }
    
    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 50px var(--purple-glow);
    }
  </style>
</head>
<body>
  <div class="bg-img">
    <img src="./3nd-team-coding.jpg" alt="">
  </div>
  
  <div class="content">
    <div class="logo">3ND.DEV</div>
    
    <div class="img-wrap">
      <img src="./3nd-lost.jpg" alt="Not That Way">
    </div>
    
    <h1>NOT THAT WAY, BUDDY</h1>
    <p>Let's get out of here.</p>
    
    <a href="/" class="btn">Back Home</a>
  </div>
</body>
</html>
