<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreeNudeDudes — 3ND.DEV</title>
  <meta http-equiv="refresh" content="3;url=https://3nd.dev">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .logo {
      width: 300px;
      max-width: 80vw;
      animation: fadeIn 1s ease-out;

      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
