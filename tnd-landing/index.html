<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Nude Dudes — Coming Soon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --black: #0a0a0a;
      --navy: #0b1a3e;
      --yellow: #FFD100;
      --orange: #FF6B00;
      --red: #FF2D00;
      --gold: #FFC847;
    }

    body {
      min-height: 100vh;
      background: var(--black);
      font-family: 'Outfit', sans-serif;
      color: #fff;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated background */
    .bg-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }

    .glow-orb:nth-child(1) {
      width: 600px; height: 600px;
      background: var(--orange);
      top: -200px; left: -200px;
      animation-delay: 0s;
    }

    .glow-orb:nth-child(2) {
      width: 500px; height: 500px;
      background: var(--yellow);
      bottom: -200px; right: -200px;
      animation-delay: -3s;
    }

    .glow-orb:nth-child(3) {
      width: 400px; height: 400px;
      background: var(--red);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.05); }
      66% { transform: translate(-20px, 20px) scale(0.95); }
    }

    /* Content */
    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 800px;
      width: 100%;
    }

    .logo-wrap {
      margin-bottom: 2rem;
      animation: logoEntrance 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
      transform: scale(0.7);
    }

    @keyframes logoEntrance {
      to { opacity: 1; transform: scale(1); }
    }

    .logo-wrap img {
      max-width: 420px;
      width: 90vw;
      filter: drop-shadow(0 0 40px rgba(255, 107, 0, 0.4));
      animation: logoSway 6s ease-in-out infinite;
    }

    @keyframes logoSway {
      0%, 100% { transform: rotate(-1deg); }
      50% { transform: rotate(1deg); }
    }

    .tagline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 7rem);
      line-height: 1;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, var(--yellow) 0%, var(--orange) 40%, var(--red) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
      animation: slideUp 0.8s ease-out 0.3s forwards;
      opacity: 0;
      transform: translateY(40px);
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.4rem);
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 3rem;
      animation: slideUp 0.8s ease-out 0.5s forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin-bottom: 3rem;
      animation: slideUp 0.8s ease-out 0.7s forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    .countdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .countdown-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.4) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .countdown-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--yellow);
      margin-top: 0.25rem;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--yellow), transparent);
      margin: 0 auto 3rem;
      animation: slideUp 0.8s ease-out 0.9s forwards;
      opacity: 0;
    }

    .notify {
      animation: slideUp 0.8s ease-out 1.1s forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    .notify p {
      font-size: 1rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 1.2rem;
      letter-spacing: 0.05em;
    }

    .email-form {
      display: flex;
      gap: 0;
      max-width: 420px;
      margin: 0 auto;
      border: 1px solid rgba(255, 209, 0, 0.3);
      border-radius: 8px;
      overflow: hidden;
      transition: border-color 0.3s;
    }

    .email-form:focus-within {
      border-color: var(--yellow);
    }

    .email-form input {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: none;
      padding: 0.9rem 1.2rem;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      outline: none;
    }

    .email-form input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    .email-form button {
      background: linear-gradient(135deg, var(--orange), var(--red));
      border: none;
      padding: 0.9rem 1.5rem;
      color: #fff;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: opacity 0.3s, transform 0.2s;
      white-space: nowrap;
    }

    .email-form button:hover {
      opacity: 0.85;
      transform: scale(1.02);
    }

    .email-form button:active {
      transform: scale(0.98);
    }

    .success-msg {
      display: none;
      color: var(--yellow);
      font-size: 1rem;
      margin-top: 1rem;
      letter-spacing: 0.05em;
    }

    .success-msg.show {
      display: block;
      animation: slideUp 0.5s ease-out;
    }

    /* Stars */
    .stars {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
      opacity: 0;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; }
      50% { opacity: var(--max-opacity); }
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Speed lines */
    .speed-lines {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%;
      height: 200px;
      pointer-events: none;
      z-index: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 20px,
        rgba(255, 209, 0, 0.015) 20px,
        rgba(255, 209, 0, 0.015) 21px
      );
    }

    /* Footer */
    .footer {
      position: relative;
      z-index: 1;
      margin-top: 4rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.2);
      letter-spacing: 0.1em;
      animation: slideUp 0.8s ease-out 1.3s forwards;
      opacity: 0;
    }

    @media (max-width: 480px) {
      .countdown { gap: 1rem; }
      .email-form { flex-direction: column; border-radius: 8px; }
      .email-form button { padding: 1rem; }
    }
  </style>
</head>
<body>

  <div class="bg-glow">
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
    <div class="glow-orb"></div>
  </div>

  <div class="stars" id="stars"></div>
  <div class="speed-lines"></div>

  <div class="container">
    <div class="logo-wrap">
      <img src="logo.png" alt="Three Nude Dudes">
    </div>

    <div class="tagline">COMING SOON</div>
    <div class="subtitle">Something ridiculous is on the way</div>

    <div class="notify">
      <p>Be the first to know when the clothes come off</p>
      <form class="email-form" id="emailForm">
        <input type="email" placeholder="your@email.com" required>
        <button type="submit">Notify Me</button>
      </form>
      <div class="success-msg" id="successMsg">🔥 You're on the list! We'll hit you up.</div>
    </div>

    <div class="footer">© 2026 Three Nude Dudes — All rights reserved</div>
  </div>

  <script>
    // Email form
    document.getElementById('emailForm').addEventListener('submit', function(e) {
      e.preventDefault();
      this.style.display = 'none';
      document.getElementById('successMsg').classList.add('show');
    });

    // Stars
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.setProperty('--duration', (2 + Math.random() * 4) + 's');
      star.style.setProperty('--max-opacity', (0.3 + Math.random() * 0.7).toFixed(2));
      star.style.animationDelay = Math.random() * 4 + 's';
      starsEl.appendChild(star);
    }
  </script>

</body>
</html>
